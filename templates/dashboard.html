{% extends "base.html" %}

{% block content %}
  <header class="topbar">
    <h1>LinksKeeper</h1>
    <form method="post" action="{{ url_for('logout') }}">
      <button class="secondary" type="submit">Log out</button>
    </form>
  </header>

  <section class="panel">
    <form method="post" action="{{ url_for('create_link') }}" class="create-form">
      <input type="url" name="url" placeholder="https://example.com/page" required>
      <label class="private-toggle">
        <input type="checkbox" name="private" value="1">
        Private hash
      </label>
      <button type="submit">Shorten</button>
    </form>
  </section>

  <section class="links">
    {% for link in links %}
      <article class="link-row">
        <a class="short" href="{{ base_url }}/{{ link.path_key }}" target="_blank" rel="noreferrer">
          {{ base_url }}/{{ link.path_key }}
        </a>
        <a class="target" href="{{ link.url }}" target="_blank" rel="noreferrer">{{ link.url }}</a>
      </article>
    {% else %}
      <p class="empty">No links yet.</p>
    {% endfor %}
  </section>
{% endblock %}
