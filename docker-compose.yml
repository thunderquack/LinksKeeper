services:
  linkskeeper:
    build: .
    container_name: linkskeeper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me}
      APP_BASE_URL: ${APP_BASE_URL:-https://your-domain.example}
      DATABASE_URL: sqlite:////data/linkskeeper.db
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
